<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netlify Forms Migration</title>
</head>
<body>
    <!-- This file is used by Netlify to detect forms in a Next.js App Router site -->
    <form name="founding-members" netlify netlify-honeypot="bot-field" hidden>
        <input type="hidden" name="form-name" value="founding-members" />
        <input type="email" name="email" />
        <input type="text" name="bot-field" />
    </form>
</body>
</html>
